name: Auto Sync ImmortalWrt

on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream (keep custom DTS)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/padavanonly/immortalwrt-mt798x-6.6.git
          git fetch upstream
          git checkout main
          git update-index --skip-worktree target/linux/mediatek/dts/mt7981b-qihoo-360t7.dts
          git merge --no-edit upstream/openwrt-24.10-6.6
          git push origin main

      - name: Keep latest 5 workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner, repo,
              per_page: 100
            });
            const toDelete = runs.slice(5);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner, repo,
                run_id: run.id
              });
            }
